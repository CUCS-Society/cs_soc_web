<p class="noPadding">本會於第一次常務會員大會就《全年工作計劃及財政預算案》進行表決，投票結果如下：<br><br>投票人數：122<br>贊成票：120<br>反對票：1<br>棄權票：1<br><br>由於投票人數超過基本會員人數四分之一（112人），且贊成票數超過投票人數一半（61人），因此本年度全年計劃及財政預算正式獲得通過。<br><br>幹事會謹此向各位會員致以誠摯謝意，感謝大家在第一次常務會員大會中的積極參與與支持。我們將秉持承諾，推動各項活動與工作，持續為會員打造更豐富、更具凝聚力的學術與社群環境。<br><br>　　以上通告<br>全體計科生<br>　　　　　　　　　　　　　　　　　　會長<br>　　　　　　　　　　　　　　　　　　　謝晉韜謹啟<br>二零二六年二月二十六日</p>
